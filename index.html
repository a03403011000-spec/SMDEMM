<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SIMFER 文件导航器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#0d1b2a;--mid:#1a3c5e;--gold:#c9a84c;--gold2:#e8c96a;
  --white:#fff;--bg:#eef2f7;--card:#fff;--border:#dde4ee;
  --text:#1a2a3a;--sub:#5a7a96;--alt:#f4f8fd;
}
body{font-family:'Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{background:linear-gradient(120deg,var(--dark) 0%,var(--mid) 70%,#22577a 100%);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(201,168,76,.4);}
.header-title{font-size:15px;font-weight:700;color:var(--white);letter-spacing:.5px;}
.header-sub{font-size:10px;color:#a8c4d8;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.btn-cfg{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--white);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-cfg:hover{background:rgba(201,168,76,.25);border-color:var(--gold);}
.search-wrap{position:relative;}
.search-input{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--white);border-radius:20px;padding:6px 14px 6px 32px;font-size:12px;width:200px;outline:none;transition:all .2s;}
.search-input::placeholder{color:rgba(255,255,255,.4);}
.search-input:focus{background:rgba(255,255,255,.18);border-color:var(--gold);width:240px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:rgba(255,255,255,.5);}
.tabs{background:var(--dark);display:flex;padding:0 24px;gap:2px;border-bottom:1px solid rgba(255,255,255,.06);}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:#7a9ab8;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.3px;white-space:nowrap;}
.tab:hover{color:var(--gold2);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{flex:1;padding:20px 24px;max-width:1400px;margin:0 auto;width:100%;}
.section{margin-bottom:24px;}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-title{font-size:13px;font-weight:700;color:var(--mid);letter-spacing:.5px;}
.section-count{background:var(--mid);color:var(--white);border-radius:10px;padding:1px 9px;font-size:10px;font-weight:700;}
.grid{display:grid;gap:12px;}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.fcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px;}
.fcard:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.1);border-color:var(--gold);}
.fcard:hover::before{width:5px;}
.fcard.S::before{background:#c0392b;} .fcard.I::before{background:#d35400;}
.fcard.M::before{background:#b7950b;} .fcard.F::before{background:#1e8449;}
.fcard.E::before{background:#1a5276;} .fcard.R::before{background:#6c3483;}
.fcard.L1::before{background:var(--dark);} .fcard.T::before{background:var(--mid);}
.fcard-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.fcard.S .fcard-icon{background:#fde8e6;} .fcard.I .fcard-icon{background:#fdeee6;}
.fcard.M .fcard-icon{background:#fdf6e3;} .fcard.F .fcard-icon{background:#e8f5ee;}
.fcard.E .fcard-icon{background:#e6eef8;} .fcard.R .fcard-icon{background:#f0e8f8;}
.fcard.L1 .fcard-icon{background:#e8ecf0;} .fcard.T .fcard-icon{background:#e8f0fe;}
.fcard-body{flex:1;min-width:0;}
.fcard-id{font-size:10px;font-family:'Courier New',monospace;font-weight:700;color:var(--sub);margin-bottom:2px;}
.fcard-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fcard-meta{font-size:10px;color:var(--sub);margin-top:3px;}
.fcard-arrow{font-size:14px;color:var(--border);transition:all .2s;flex-shrink:0;}
.fcard:hover .fcard-arrow{color:var(--gold);transform:translateX(3px);}
.tag{display:inline-flex;align-items:center;justify-content:center;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:800;color:var(--white);margin-right:4px;}
.tS{background:#c0392b;}.tI{background:#d35400;}.tM{background:#b7950b;}
.tF{background:#1e8449;}.tE{background:#1a5276;}.tR{background:#6c3483;}
.tL1{background:var(--dark);}.tT{background:var(--mid);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--white);border-radius:16px;width:min(720px,96vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-hdr{background:linear-gradient(90deg,var(--dark),var(--mid));padding:16px 22px;display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h2{color:var(--white);font-size:15px;font-weight:700;}
.modal-close{background:rgba(255,255,255,.15);border:0;color:var(--white);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:rgba(255,255,255,.25);}
.modal-body{flex:1;overflow-y:auto;padding:20px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:#fafbfc;}
.cfg-section{margin-bottom:22px;}
.cfg-section h3{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.cfg-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;background:var(--alt);border-radius:8px;border:1px solid var(--border);}
.cfg-label{font-size:11px;font-weight:600;color:var(--text);min-width:130px;flex-shrink:0;}
.cfg-label small{display:block;font-size:9px;color:var(--sub);font-weight:400;margin-top:1px;}
.cfg-input{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:11px;color:var(--text);outline:none;transition:border .2s;font-family:inherit;}
.cfg-input:focus{border-color:var(--gold);}
.cfg-test{background:var(--mid);color:var(--white);border:0;border-radius:6px;padding:7px 12px;font-size:11px;cursor:pointer;white-space:nowrap;transition:background .2s;}
.cfg-test:hover{background:var(--dark);}
.btn-save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:0;border-radius:8px;padding:9px 22px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-save:hover{opacity:.9;}
.btn-cancel{background:var(--alt);color:var(--sub);border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;}
.btn-export{background:#1e8449;color:var(--white);border:0;border-radius:6px;padding:7px 12px;font-size:11px;cursor:pointer;}
.hint{font-size:10px;color:var(--sub);margin-top:6px;line-height:1.6;background:#f0f4f8;padding:8px 10px;border-radius:6px;border-left:3px solid var(--gold);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:var(--white);padding:12px 20px;border-radius:10px;font-size:12px;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;border-left:4px solid var(--gold);}
.toast.show{transform:translateY(0);opacity:1;}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;}
.stats{background:var(--dark);display:flex;border-bottom:1px solid rgba(255,255,255,.06);}
.stat{flex:1;padding:10px 0;text-align:center;border-right:1px solid rgba(255,255,255,.06);}
.stat:last-child{border-right:none;}
.stat-n{font-size:17px;font-weight:800;color:var(--gold);}
.stat-l{font-size:10px;color:#7a9ab8;margin-top:1px;}
.no-url{position:absolute;top:8px;right:8px;background:#fde8e6;color:#c0392b;border-radius:4px;font-size:9px;padding:1px 5px;font-weight:700;}
.recent-bar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:10px;overflow-x:auto;}
.recent-label{font-size:10px;color:var(--sub);white-space:nowrap;font-weight:700;}
.recent-chip{background:var(--alt);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;}
.recent-chip:hover{background:var(--mid);color:var(--white);border-color:var(--mid);}

/* ── 同步状态指示器 ── */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-right:5px;transition:background .3s;}
.sync-dot.ok{background:#2ecc71;box-shadow:0 0 6px #2ecc71;}
.sync-dot.err{background:#e74c3c;}
.sync-dot.ing{background:#f39c12;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-label{font-size:10px;color:#a8c4d8;}

/* ── Firebase 配置引导 ── */
.fb-setup{background:linear-gradient(135deg,#1a3c5e,#0d1b2a);border:2px dashed var(--gold);border-radius:12px;padding:24px;text-align:center;margin:20px 0;}
.fb-setup h3{color:var(--gold);font-size:15px;margin-bottom:10px;}
.fb-setup p{color:#a8c4d8;font-size:12px;line-height:1.8;}
.fb-setup code{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;color:var(--gold2);font-size:11px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">⛏</div>
    <div>
      <div class="header-title">SIMFER 体系文件导航器</div>
      <div class="header-sub">快速进入 Google Drive 各模块文件夹</div>
    </div>
  </div>
  <div class="header-right">
    <span class="sync-dot" id="syncDot"></span>
    <span class="sync-label" id="syncLabel">连接中...</span>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="搜索文件/文件夹..." oninput="doSearch(this.value)"/>
    </div>
    <button class="btn-cfg" onclick="openConfig()">⚙ 配置文件夹链接</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-n">17</div><div class="stat-l">制度文件</div></div>
  <div class="stat"><div class="stat-n">47</div><div class="stat-l">附件表单</div></div>
  <div class="stat"><div class="stat-n">12</div><div class="stat-l">综合台账</div></div>
  <div class="stat"><div class="stat-n" id="cfgCount">0</div><div class="stat-l">已配置链接</div></div>
  <div class="stat"><div class="stat-n" id="recentCount">0</div><div class="stat-l">最近访问</div></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('all',this)">🗂 全部</div>
  <div class="tab" onclick="switchTab('L1',this)">🏛 L1 总制度</div>
  <div class="tab" onclick="switchTab('S',this)">🛡 安全 Safety</div>
  <div class="tab" onclick="switchTab('I',this)">🔩 完整性 Integrity</div>
  <div class="tab" onclick="switchTab('M',this)">🔧 维护 Maintenance</div>
  <div class="tab" onclick="switchTab('F',this)">💰 财务 Finance</div>
  <div class="tab" onclick="switchTab('E',this)">🌿 环境 Environment</div>
  <div class="tab" onclick="switchTab('R',this)">📊 可靠性 Reliability</div>
  <div class="tab" onclick="switchTab('T',this)">📋 综合台账</div>
</div>

<!-- RECENT -->
<div class="recent-bar" id="recentBar" style="display:none">
  <span class="recent-label">🕐 最近访问：</span>
  <div id="recentChips"></div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">正在连接 Firebase，加载数据中...</div></div>
</div>

<!-- CONFIG MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2>⚙ 配置 Google Drive 文件夹链接</h2>
      <button class="modal-close" onclick="closeConfig()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-export" onclick="exportConfig()">📤 导出配置</button>
      <label class="btn-export" style="cursor:pointer;background:var(--mid)">📥 导入配置<input type="file" accept=".json" style="display:none" onchange="importConfig(this)"/></label>
      <button class="btn-cancel" onclick="closeConfig()">取消</button>
      <button class="btn-save" onclick="saveConfig()">💾 保存并同步</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══ Firebase SDK ══ -->
<script type="module">

  authDomain: "smdem-61138.firebaseapp.com",
  databaseURL: "https://smdem-61138-default-rtdb.asia-southeast1.firebasedatabase.app",

};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

  // ── 初始化 ──
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const urlsRef = ref(db, 'simfer_urls');

  // ── 暴露给全局 ──
  window._fbSet    = (id, url) => set(ref(db, `simfer_urls/${id}`), url);
  window._fbDel    = (id)      => set(ref(db, `simfer_urls/${id}`), null);
  window._fbUpdate = (obj)     => update(urlsRef, obj);
  window._fbGet    = ()        => get(urlsRef).then(s => s.val() || {});

  // ── 实时监听：任何人改了都会推送到所有客户端 ──
  onValue(urlsRef, (snapshot) => {
    window.urls = snapshot.val() || {};
    setSyncStatus('ok', '已同步');
    render();
  }, (error) => {
    setSyncStatus('err', '连接失败');
    showToast('❌ Firebase 连接失败：' + error.message);
  });

  setSyncStatus('ing', '连接中...');
</script>

const ELEM_LABELS = {
  L1:"L1 顶层总制度", S:"S 安全管理", I:"I 完整性管理",
  M:"M 维护管理", F:"F 财务成本", E:"E 环境管理",
  R:"R 可靠性管理", T:"综合台账"
};

// ══════════════════════════════════════════════════
//  状态（urls 由 Firebase 实时注入到 window.urls）
// ══════════════════════════════════════════════════
window.urls = {};
let recent = [];
let currentTab = 'all';
let searchQ = '';
let tempUrls = {};

try { recent = JSON.parse(localStorage.getItem('simfer_recent')||'[]'); } catch(e){recent=[];}

// ── 同步状态显示 ──
window.setSyncStatus = function(status, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
};

// ══════════════════════════════════════════════════
//  渲染主界面
// ══════════════════════════════════════════════════
window.render = function() {
  const mc = document.getElementById('mainContent');
  let items = ITEMS;
  if (currentTab !== 'all') items = items.filter(i => i.elem === currentTab);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    items = items.filter(i => i.title.toLowerCase().includes(q) || i.id.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
  }
  if (items.length === 0) {
    mc.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配的文件</div></div>`;
    return;
  }
  const groups = {};
  items.forEach(i => { if (!groups[i.elem]) groups[i.elem]=[]; groups[i.elem].push(i); });
  let html = '';
  const order = currentTab==='all' ? ['L1','S','I','M','F','E','R','T'] : [currentTab];
  order.forEach(elem => {
    if (!groups[elem]) return;
    const grpItems = groups[elem];
    const cfgd = grpItems.filter(i=>window.urls[i.id]).length;
    html += `<div class="section">
      <div class="section-hdr">
        <span class="tag t${elem}">${elem}</span>
        <span class="section-title">${ELEM_LABELS[elem]||elem}</span>
        <span class="section-count">${grpItems.length} 项</span>
        ${cfgd>0?`<span style="font-size:10px;color:#1e8449;font-weight:700;">✅ ${cfgd}/${grpItems.length} 已配置</span>`:'<span style="font-size:10px;color:#c0392b;">⚠ 未配置链接</span>'}
      </div>
      <div class="grid grid-3">`;
    grpItems.forEach(item => {
      const hasUrl = !!window.urls[item.id];
      html += `<div class="fcard ${item.elem}" onclick="openItem('${item.id}')" title="${item.desc}">
        ${!hasUrl?'<span class="no-url">未配置</span>':''}
        <div class="fcard-icon">${item.icon}</div>
        <div class="fcard-body">
          <div class="fcard-id">${item.id}</div>
          <div class="fcard-title">${item.title}</div>
          <div class="fcard-meta">${item.type} · ${item.desc}</div>
        </div>
        <div class="fcard-arrow">›</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  mc.innerHTML = html;
  updateStats();
  renderRecent();
};

function updateStats() {
  document.getElementById('cfgCount').textContent = Object.keys(window.urls).length;
  document.getElementById('recentCount').textContent = recent.length;
}

function renderRecent() {
  const bar = document.getElementById('recentBar');
  const chips = document.getElementById('recentChips');
  if (recent.length===0){bar.style.display='none';return;}
  bar.style.display='flex';
  chips.innerHTML = recent.slice(0,8).map(r=>
    `<div class="recent-chip" onclick="openUrl('${r.url}','${r.id}','${r.title.replace(/'/g,"\\'")}','${r.icon||'📁'}')">
      ${r.icon||'📁'} ${r.id}
    </div>`
  ).join('');
}

// ══════════════════════════════════════════════════
//  打开文件
// ══════════════════════════════════════════════════
window.openItem = function(id) {
  const item = ITEMS.find(i=>i.id===id);
  if (!item) return;
  const url = window.urls[id];
  if (!url) { showToast(`⚠ ${id} 尚未配置链接`); openConfig(id); return; }
  openUrl(url, id, item.title, item.icon);
};

window.openUrl = function(url, id, title, icon) {
  window.open(url, '_blank');
  recent = recent.filter(r=>r.id!==id);
  recent.unshift({id, title, url, icon: icon||'📁'});
  if (recent.length>20) recent=recent.slice(0,20);
  localStorage.setItem('simfer_recent', JSON.stringify(recent));
  renderRecent();
  updateStats();
  showToast(`✅ 已打开：${id} ${title}`);
};

// ══════════════════════════════════════════════════
//  搜索 & Tab
// ══════════════════════════════════════════════════
window.doSearch = function(q) {
  searchQ = q.trim();
  if (searchQ) currentTab='all';
  render();
};

window.switchTab = function(tab, el) {
  currentTab = tab; searchQ = '';
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
};

// ══════════════════════════════════════════════════
//  配置弹窗
// ══════════════════════════════════════════════════
window.openConfig = function(focusId) {
  tempUrls = {...window.urls};
  const body = document.getElementById('modalBody');
  const groups = {};
  ITEMS.forEach(i=>{ if(!groups[i.elem]) groups[i.elem]=[]; groups[i.elem].push(i); });
  let html = `<div class="hint">
    💡 将 Google Drive 文件夹或文件的分享链接粘贴到对应输入框。<br>
    点击「<b>保存并同步</b>」后，所有人的页面将<b>实时更新</b>。
  </div><br>`;
  ['L1','S','I','M','F','E','R','T'].forEach(elem=>{
    if(!groups[elem]) return;
    html+=`<div class="cfg-section"><h3><span class="tag t${elem}">${elem}</span> ${ELEM_LABELS[elem]||elem}</h3>`;
    groups[elem].forEach(item=>{
      const val = tempUrls[item.id]||'';
      html+=`<div class="cfg-row" id="row_${item.id}">
        <div class="cfg-label">${item.icon} ${item.id}<small>${item.title}</small></div>
        <input class="cfg-input" id="inp_${item.id}" value="${val}" placeholder="粘贴 Google Drive 链接..." oninput="tempUrls['${item.id}']=this.value.trim()"/>
        <button class="cfg-test" onclick="testUrl('${item.id}')">测试</button>
      </div>`;
    });
    html+=`</div>`;
  });
  body.innerHTML = html;
  document.getElementById('overlay').classList.add('show');
  if (focusId) {
    setTimeout(()=>{
      const el=document.getElementById(`inp_${focusId}`);
      if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.focus();}
    },200);
  }
};

window.closeConfig = function() {
  document.getElementById('overlay').classList.remove('show');
};

window.saveConfig = async function() {
  // 读取所有输入框最新值
  const updates = {};
  ITEMS.forEach(item=>{
    const el=document.getElementById(`inp_${item.id}`);
    if(el){
      const v=el.value.trim();
      updates[item.id] = v || null; // null 会删除该节点
    }
  });

  setSyncStatus('ing','保存中...');
  try {
    if (window._fbUpdate) {
      await window._fbUpdate(updates);
      closeConfig();
      showToast(`✅ 已同步到云端，所有人实时更新`);
    } else {
      showToast('❌ Firebase 未连接，请刷新页面重试');
    }
  } catch(e) {
    setSyncStatus('err','保存失败');
    showToast('❌ 保存失败：' + e.message);
  }
};

window.testUrl = function(id) {
  const el=document.getElementById(`inp_${id}`);
  const url=el?el.value.trim():'';
  if(!url){showToast('⚠ 请先输入链接');return;}
  window.open(url,'_blank');
};

// ══════════════════════════════════════════════════
//  导出 / 导入
// ══════════════════════════════════════════════════
window.exportConfig = function() {
  ITEMS.forEach(item=>{
    const el=document.getElementById(`inp_${item.id}`);
    if(el){const v=el.value.trim();if(v)tempUrls[item.id]=v;else delete tempUrls[item.id];}
  });
  const blob=new Blob([JSON.stringify(tempUrls,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='SIMFER_文件链接配置.json';
  a.click();
  showToast('📤 配置已导出');
};

window.importConfig = function(input) {
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      tempUrls={...tempUrls,...data};
      Object.entries(data).forEach(([id,url])=>{
        const el=document.getElementById(`inp_${id}`);
        if(el) el.value=url;
      });
      showToast(`📥 已导入 ${Object.keys(data).length} 条配置，请点击「保存并同步」`);
    }catch(err){showToast('❌ 导入失败，请检查JSON格式');}
  };
  reader.readAsText(file);
  input.value='';
};

// ══════════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════════
let toastTimer;
window.showToast = function(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
};

// 初始渲染（Firebase 连接后会自动触发 render）
renderRecent();
</script>

</html>
